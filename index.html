<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carplay_Geo - TikTok Creator Publishing Tool</title>
  <style>
    :root { --bg:#0b0b10; --card:#171723; --text:#f5f7ff; --muted:#aeb4d1; --accent:#17c4ff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:linear-gradient(160deg,#0b0b10,#101425); color:var(--text); }
    .wrap { max-width:860px; margin:40px auto; padding:20px; }
    .card { background:var(--card); border:1px solid #2a2f4a; border-radius:16px; padding:24px; }
    h1 { margin:0 0 8px; font-size:30px; }
    p { color:var(--muted); line-height:1.45; }
    .row { display:flex; gap:10px; flex-wrap:wrap; margin:18px 0; }
    input { flex:1 1 320px; min-width:280px; padding:12px 14px; border-radius:10px; border:1px solid #3a4165; background:#0f1326; color:var(--text); }
    button { padding:12px 16px; border:0; border-radius:10px; font-weight:700; cursor:pointer; background:var(--accent); color:#021018; }
    .status { margin-top:14px; padding:10px 12px; border-radius:8px; background:#0f1326; border:1px solid #2d3558; color:var(--muted); word-break:break-word; }
    .small { font-size:13px; color:var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>TikTok Creator Publishing Tool</h1>
      <p>Carplay_Geo helps creators connect TikTok, upload videos, and publish posts from one dashboard.</p>

      <div class="row">
        <input id="clientKey" type="text" placeholder="Paste TikTok Client Key here" />
        <button id="connectBtn" type="button">Connect TikTok</button>
      </div>

      <div class="small">Redirect URI used by this page: <code>https://lukaluka7.github.io/</code></div>
      <div id="status" class="status">Status: waiting for login.</div>
    </div>
  </div>

  <script>
    (function () {
      var redirectUri = "https://lukaluka7.github.io/";
      var scopes = "user.info.basic,video.upload,video.publish";
      var statusEl = document.getElementById("status");
      var clientKeyInput = document.getElementById("clientKey");
      var connectBtn = document.getElementById("connectBtn");

      function setStatus(text) {
        statusEl.textContent = "Status: " + text;
      }

      function randomState() {
        return Math.random().toString(36).slice(2) + Date.now().toString(36);
      }

      var params = new URLSearchParams(window.location.search);
      if (params.get("code")) {
        setStatus("OAuth code received. Copy this for your backend token exchange: " + params.get("code"));
      }
      if (params.get("error")) {
        setStatus("OAuth error: " + params.get("error") + (params.get("error_description") ? " - " + params.get("error_description") : ""));
      }

      connectBtn.addEventListener("click", function () {
        var clientKey = clientKeyInput.value.trim();
        if (!clientKey) {
          setStatus("Paste your TikTok Client Key first.");
          return;
        }

        var state = randomState();
        localStorage.setItem("tt_oauth_state", state);

        var authUrl = new URL("https://www.tiktok.com/v2/auth/authorize/");
        authUrl.searchParams.set("client_key", clientKey);
        authUrl.searchParams.set("response_type", "code");
        authUrl.searchParams.set("scope", scopes);
        authUrl.searchParams.set("redirect_uri", redirectUri);
        authUrl.searchParams.set("state", state);

        window.location.href = authUrl.toString();
      });
    })();
  </script>
</body>
</html>
